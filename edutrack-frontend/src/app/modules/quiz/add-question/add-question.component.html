<div class="container py-4">

  <div class="d-flex align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0" style="color:#1F4E79;">
        ❓ Add Questions to Quiz
      </h3>
      <p class="text-muted mb-0">
        {{ addedQuestions.length }} questions added so far
      </p>
    </div>
  </div>

  <div class="row g-4">

    <!-- Add Question Form -->
    <div class="col-md-7">
      <div class="card border-0 shadow-sm p-4">

        <div class="alert alert-success" *ngIf="successMessage">
          ✅ {{ successMessage }}
        </div>
        <div class="alert alert-danger" *ngIf="errorMessage">
          ❌ {{ errorMessage }}
        </div>

        <!-- Question Text -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Question <span class="text-danger">*</span>
          </label>
          <textarea
            class="form-control"
            rows="3"
            placeholder="Enter your question here..."
            [(ngModel)]="questionText">
          </textarea>
        </div>

        <!-- Options -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Options <span class="text-danger">*</span>
          </label>
          <div class="d-flex align-items-center mb-2">
            <span class="option-label me-3">A</span>
            <input type="text" class="form-control"
              placeholder="Option A"
              [(ngModel)]="optionA" />
          </div>
          <div class="d-flex align-items-center mb-2">
            <span class="option-label me-3">B</span>
            <input type="text" class="form-control"
              placeholder="Option B"
              [(ngModel)]="optionB" />
          </div>
          <div class="d-flex align-items-center mb-2">
            <span class="option-label me-3">C</span>
            <input type="text" class="form-control"
              placeholder="Option C"
              [(ngModel)]="optionC" />
          </div>
          <div class="d-flex align-items-center mb-2">
            <span class="option-label me-3">D</span>
            <input type="text" class="form-control"
              placeholder="Option D"
              [(ngModel)]="optionD" />
          </div>
        </div>

        <!-- Correct Answer -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Correct Answer <span class="text-danger">*</span>
          </label>
          <div class="d-flex gap-3">
            <div *ngFor="let opt of ['A','B','C','D']"
              class="answer-option text-center px-4 py-2"
              [class.selected]="correctOption === opt"
              (click)="correctOption = opt">
              {{ opt }}
            </div>
          </div>
        </div>

        <!-- Explanation -->
        <div class="mb-4">
          <label class="form-label fw-semibold">
            Explanation (optional)
          </label>
          <input
            type="text"
            class="form-control"
            placeholder="Explain why this answer is correct..."
            [(ngModel)]="explanation"
          />
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3">
          <button
            class="btn btn-primary flex-grow-1 fw-bold"
            (click)="addQuestion()"
            [disabled]="isLoading">
            <span *ngIf="isLoading"
              class="spinner-border spinner-border-sm me-2">
            </span>
            {{ isLoading ? 'Adding...' : '+ Add Question' }}
          </button>
          <button
            class="btn btn-success flex-grow-1 fw-bold"
            (click)="finishAndGoToCourse()"
            *ngIf="addedQuestions.length > 0">
            ✅ Finish
          </button>
        </div>

      </div>
    </div>

    <!-- Added Questions List -->
    <div class="col-md-5">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-0 pt-3">
          <h6 class="fw-bold mb-0" style="color:#1F4E79;">
            ✅ Added Questions ({{ addedQuestions.length }})
          </h6>
        </div>
        <div class="card-body">
          <div *ngIf="addedQuestions.length === 0"
            class="text-center py-3 text-muted">
            No questions added yet
          </div>
          <div *ngFor="let q of addedQuestions; let i = index"
            class="question-item mb-3 p-3 rounded-3">
            <p class="fw-semibold small mb-1">
              Q{{ i + 1 }}. {{ q.questionText }}
            </p>
            <small class="text-success">
              ✅ Correct: Option {{ q.correctOption }}
            </small>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>
