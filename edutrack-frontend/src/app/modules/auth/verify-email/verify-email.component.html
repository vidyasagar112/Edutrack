<div class="auth-page d-flex align-items-center
            justify-content-center">
  <div class="auth-card card border-0 shadow-lg p-4
              text-center">

    <!-- Loading -->
    <div *ngIf="isLoading" class="py-4">
      <div class="spinner-border text-primary"
        style="width:3rem;height:3rem;">
      </div>
      <p class="mt-3 text-muted">
        Verifying your email...
      </p>
    </div>

    <!-- Success -->
    <div *ngIf="!isLoading && isSuccess">
      <div style="font-size:5rem;">✅</div>
      <h4 class="fw-bold text-success mt-3">
        Email Verified!
      </h4>
      <p class="text-muted">
        Your email has been verified successfully.
        You can now login.
      </p>
      <a routerLink="/login"
        class="btn btn-primary btn-lg mt-3 px-5">
        🎓 Go to Login
      </a>
    </div>

    <!-- Error -->
    <div *ngIf="!isLoading && !isSuccess">
      <div style="font-size:5rem;">❌</div>
      <h4 class="fw-bold text-danger mt-3">
        Verification Failed!
      </h4>
      <p class="text-muted">{{ errorMessage }}</p>
      <a routerLink="/login"
        class="btn btn-outline-primary mt-3">
        ← Back to Login
      </a>
    </div>

  </div>
</div>
