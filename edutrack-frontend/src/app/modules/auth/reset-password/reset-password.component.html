<div class="auth-page d-flex align-items-center
            justify-content-center">
  <div class="auth-card card border-0 shadow-lg p-4">

    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color:#1F4E79;">
        🎓 EduTrack
      </h2>
      <h5 class="text-muted">Reset Password</h5>
    </div>

    <!-- Success -->
    <div *ngIf="isSuccess" class="text-center py-3">
      <div style="font-size:4rem;">✅</div>
      <h5 class="fw-bold text-success mt-3">
        Password Reset!
      </h5>
      <p class="text-muted">
        Redirecting to login in 3 seconds...
      </p>
      <a routerLink="/login" class="btn btn-primary mt-2">
        Login Now
      </a>
    </div>

    <!-- Form -->
    <div *ngIf="!isSuccess">

      <div class="alert alert-danger" *ngIf="errorMessage">
        ❌ {{ errorMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">
          New Password
        </label>
        <div class="input-group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-control form-control-lg"
            placeholder="Min 6 characters"
            [(ngModel)]="newPassword" />
          <button class="btn btn-outline-secondary"
            type="button"
            (click)="showPassword = !showPassword">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">
          Confirm Password
        </label>
        <input type="password"
          class="form-control form-control-lg"
          placeholder="Re-enter password"
          [(ngModel)]="confirmPassword"
          (keyup.enter)="submit()" />
        <small class="text-danger"
          *ngIf="confirmPassword &&
                 newPassword !== confirmPassword">
          Passwords do not match!
        </small>
      </div>

      <button class="btn btn-primary btn-lg w-100 fw-bold"
        (click)="submit()"
        [disabled]="isLoading || !token">
        <span *ngIf="isLoading"
          class="spinner-border spinner-border-sm me-2">
        </span>
        {{ isLoading ? 'Resetting...' : '🔐 Reset Password' }}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-muted small">
          ← Back to Login
        </a>
      </div>

    </div>
  </div>
</div>
