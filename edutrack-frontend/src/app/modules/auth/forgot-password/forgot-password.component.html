<div class="auth-page d-flex align-items-center
            justify-content-center">
  <div class="auth-card card border-0 shadow-lg p-4">

    <!-- Logo -->
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color:#1F4E79;">
        🎓 EduTrack
      </h2>
      <h5 class="text-muted">Forgot Password?</h5>
      <p class="text-muted small">
        Enter your email and we'll send you a reset link
      </p>
    </div>

    <!-- Success State -->
    <div *ngIf="emailSent" class="text-center py-3">
      <div style="font-size:4rem;">📧</div>
      <h5 class="fw-bold text-success mt-3">
        Email Sent!
      </h5>
      <p class="text-muted">{{ successMessage }}</p>
      <p class="text-muted small">
        Didn't receive it?
        <button class="btn btn-link p-0 small"
          (click)="emailSent=false">
          Try again
        </button>
      </p>
      <a routerLink="/login"
        class="btn btn-primary mt-3">
        Back to Login
      </a>
    </div>

    <!-- Form -->
    <div *ngIf="!emailSent">
      <div class="alert alert-danger" *ngIf="errorMessage">
        ❌ {{ errorMessage }}
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">
          Email Address
        </label>
        <input type="email" class="form-control form-control-lg"
          placeholder="Enter your registered email"
          [(ngModel)]="email"
          (keyup.enter)="submit()" />
      </div>

      <button class="btn btn-primary btn-lg w-100 fw-bold"
        (click)="submit()"
        [disabled]="isLoading">
        <span *ngIf="isLoading"
          class="spinner-border spinner-border-sm me-2">
        </span>
        {{ isLoading ? 'Sending...' : '📧 Send Reset Link' }}
      </button>

      <div class="text-center mt-3">
        <a routerLink="/login"
          class="text-muted small">
          ← Back to Login
        </a>
      </div>
    </div>

  </div>
</div>
