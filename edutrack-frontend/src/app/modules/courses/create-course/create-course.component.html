<div class="container py-4">

  <!-- Header -->
  <div class="d-flex align-items-center mb-4">
    <a routerLink="/dashboard"
      class="btn btn-outline-secondary me-3">
      ← Back
    </a>
    <div>
      <h3 class="fw-bold mb-0" style="color:#1F4E79;">
        📚 Create New Course
      </h3>
      <p class="text-muted mb-0">
        Fill in the details to create your course
      </p>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm p-4">

        <!-- Messages -->
        <div class="alert alert-success" *ngIf="successMessage">
          ✅ {{ successMessage }}
        </div>
        <div class="alert alert-danger" *ngIf="errorMessage">
          ❌ {{ errorMessage }}
        </div>

        <!-- Title -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Course Title <span class="text-danger">*</span>
          </label>
          <input
            type="text"
            class="form-control form-control-lg"
            placeholder="e.g. Complete Java Spring Boot Course"
            [(ngModel)]="title"
          />
        </div>

        <!-- Subject -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Subject <span class="text-danger">*</span>
          </label>
          <select class="form-select form-select-lg"
            [(ngModel)]="subject">
            <option value="">Select a subject</option>
            <option *ngFor="let s of subjects" [value]="s">
              {{ s }}
            </option>
          </select>
        </div>

        <!-- Description -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Description
          </label>
          <textarea
            class="form-control"
            rows="4"
            placeholder="Describe what students will learn..."
            [(ngModel)]="description">
          </textarea>
        </div>

        <!-- Thumbnail URL -->
        <div class="mb-3">
          <label class="form-label fw-semibold">
            Thumbnail URL (optional)
          </label>
          <input
            type="url"
            class="form-control"
            placeholder="https://example.com/image.jpg"
            [(ngModel)]="thumbnailUrl"
          />
        </div>

        <!-- Publish Toggle -->
        <div class="mb-4">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              [(ngModel)]="published"
              id="publishToggle"
            />
            <label class="form-check-label fw-semibold"
              for="publishToggle">
              {{ published ? '✅ Published' : '📝 Save as Draft' }}
            </label>
          </div>
          <small class="text-muted">
            Published courses are visible to all students
          </small>
        </div>

        <!-- Submit -->
        <button
          class="btn btn-primary btn-lg w-100 fw-bold"
          (click)="createCourse()"
          [disabled]="isLoading">
          <span *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2">
          </span>
          {{ isLoading ? 'Creating...' : '🚀 Create Course' }}
        </button>

      </div>
    </div>
  </div>

</div>
