<div class="container py-4">

  <!-- Header -->
  <div class="d-flex align-items-center mb-4">
    <button class="btn btn-outline-secondary me-3"
      onclick="history.back()">← Back</button>
    <div>
      <h3 class="fw-bold mb-0" style="color:#1F4E79;">
        👥 Enrolled Students
      </h3>
      <p class="text-muted mb-0" *ngIf="courseName">
        {{ courseName }}
      </p>
    </div>
  </div>

  <!-- Loading -->
  <div class="text-center py-5" *ngIf="isLoading">
    <div class="spinner-border text-primary"
      style="width:3rem;height:3rem;"></div>
    <p class="mt-3 text-muted">Loading students...</p>
  </div>

  <!-- Students Table -->
  <div class="card border-0 shadow-sm"
    *ngIf="!isLoading">
    <div class="card-header bg-white border-0 pt-3">
      <h5 class="fw-bold mb-0" style="color:#1F4E79;">
        {{ enrollments.length }} Students Enrolled
      </h5>
    </div>
    <div class="card-body">

      <div *ngIf="enrollments.length === 0"
        class="text-center py-4">
        <p class="text-muted">No students enrolled yet!</p>
      </div>

      <div class="table-responsive"
        *ngIf="enrollments.length > 0">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Student Name</th>
              <th>Email</th>
              <th>Progress</th>
              <th>Status</th>
              <th>View Profile</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let e of enrollments; let i=index">
              <td class="text-muted">{{ i+1 }}</td>
              <td class="fw-semibold">{{ e.studentName }}</td>
              <td class="text-muted small">
                {{ e.studentEmail }}
              </td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="progress flex-grow-1"
                    style="height:8px;width:80px;">
                    <div class="progress-bar bg-primary"
                      [style.width.%]="e.progressPercent">
                    </div>
                  </div>
                  <small>{{ e.progressPercent }}%</small>
                </div>
              </td>
              <td>
                <span class="badge"
                  [ngClass]="getStatusColor(e.status)">
                  {{ e.status }}
                </span>
              </td>
              <td>
                <a [routerLink]="['/profile/view', e.studentId]"
                  class="btn btn-sm btn-outline-primary">
                  👤 View Profile
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>
