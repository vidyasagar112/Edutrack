<div class="toast-container">
  <div *ngFor="let toast of toasts"
    class="toast-item"
    [ngClass]="getBgClass(toast.type)">
    <span class="toast-icon">
      {{ getIcon(toast.type) }}
    </span>
    <span class="toast-message">
      {{ toast.message }}
    </span>
    <button class="toast-close"
      (click)="remove(toast.id)">
      ✕
    </button>
  </div>
</div>
