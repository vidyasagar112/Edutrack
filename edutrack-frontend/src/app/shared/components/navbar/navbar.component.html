      <ul class="navbar-nav me-auto">

        <li class="nav-item">
  <a class="nav-link"

  </a>
</li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/courses">Courses</a>
        </li>

        <!-- Student Links -->
        <li class="nav-item"
          *ngIf="isLoggedIn && isStudent">
          <a class="nav-link" routerLink="/dashboard">

          </a>
        </li>
        <li class="nav-item"
          *ngIf="isLoggedIn && isStudent">
          <a class="nav-link" routerLink="/analytics">
            Analytics
          </a>
        </li>
        <li class="nav-item"
          *ngIf="isLoggedIn && isStudent">
          <a class="nav-link" routerLink="/progress">

          </a>
        </li>

        <li class="nav-item"

          </a>
        </li>

        <li class="nav-item"
          *ngIf="isLoggedIn && isAdmin">
          <a class="nav-link" routerLink="/admin">

          </a>
        </li>

      <ul class="navbar-nav">

        <li class="nav-item" *ngIf="!isLoggedIn">

          </a>

        <li class="nav-item dropdown" *ngIf="isLoggedIn">
          <a class="nav-link dropdown-toggle" href="#"

          <ul class="dropdown-menu dropdown-menu-end">

            <li *ngIf="isStudent">
              <a class="dropdown-item"

                📊 Dashboard
              </a>
            </li>
            <!-- Add inside the logged in dropdown BEFORE logout -->
<li *ngIf="isStudent || isInstructor">
  <a class="dropdown-item" routerLink="/profile">
    👤 My Profile
  </a>
</li>
            <li *ngIf="isStudent">
              <a class="dropdown-item"
                routerLink="/analytics">

              </a>
            </li>

              </a>
            </li>
            <li *ngIf="isInstructor">
              <a class="dropdown-item"
                routerLink="/dashboard">
                📚 My Courses
              </a>
            </li>
            <li *ngIf="isAdmin">
              <a class="dropdown-item"
                routerLink="/admin">
                🛡️ Admin Panel
              </a>
            </li>

              <button class="dropdown-item text-danger"
